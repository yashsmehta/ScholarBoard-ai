<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive visualization of scholars positioned by their research similarity">
    <meta name="theme-color" content="#4a6fa5">
    <title>ScholarBoard.ai</title>
    <link rel="stylesheet" href="css/styles.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/futura-pt" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>ScholarBoard.ai</h1>
            <p>Find and explore scholars visually</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="map-container">
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="search-input" placeholder="Search scholars by name...">
                    </div>
                    <div class="search-results" id="search-results"></div>
                </div>

                <div class="filter-container">
                    <button id="filter-toggle" class="filter-toggle" title="Filter by institution">
                        <i class="fas fa-filter"></i>
                    </button>
                    <div class="filter-dropdown" id="filter-dropdown">
                        <div class="filter-section">
                            <h3>Filter by Institution</h3>
                        </div>
                        <div class="filter-options" id="filter-options"></div>
                        <div class="filter-actions">
                            <button id="apply-filters" class="apply-button">Apply</button>
                            <button id="clear-filters" class="clear-button">Clear All</button>
                        </div>
                    </div>
                </div>

                <div id="scholar-map"></div>

                <div class="map-hint">
                    Scroll to zoom &middot; Drag to pan &middot; Click a dot for details
                </div>
            </div>

            <div id="sidebar">
                <div class="sidebar-header">
                    <h2>Scholar Profile</h2>
                    <button id="close-sidebar" title="Close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="scholar-details">
                    <div class="placeholder-message">
                        <i class="fas fa-user-circle"></i>
                        <p>Select a scholar to view their profile</p>
                        <small>Click on any dot in the map</small>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/script.js?v=2.0"></script>
</body>
</html>
