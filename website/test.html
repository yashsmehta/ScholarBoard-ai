<!DOCTYPE html>
<html>
<head>
    <title>Scholar Data Test</title>
</head>
<body>
    <h1>Scholar Data Test</h1>
    <div id="result"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const resultDiv = document.getElementById('result');
            
            try {
                console.log('Fetching scholars.json...');
                const response = await fetch('data/scholars.json');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`Failed to load scholars.json: ${response.status}`);
                }
                
                const scholarsData = await response.json();
                console.log('Loaded scholars data:', scholarsData);
                
                // Convert from object format to array format
                const scholars = Object.entries(scholarsData).map(([id, scholar]) => {
                    return {
                        id: scholar.id,
                        name: scholar.name,
                        institution: scholar.institution || '',
                        country: scholar.country || '',
                        umap: scholar.umap_projection ? [scholar.umap_projection.x, scholar.umap_projection.y] : null,
                        cluster_id: scholar.cluster || 0
                    };
                });
                
                console.log(`Converted ${scholars.length} scholars`);
                
                // Check if scholars have the required properties
                const validScholars = scholars.filter(scholar => {
                    // Check if scholar has UMAP coordinates
                    const hasUMAP = scholar.umap && Array.isArray(scholar.umap) && scholar.umap.length === 2;
                    
                    if (!scholar.id || !scholar.name || !hasUMAP) {
                        console.warn('Invalid scholar data:', scholar);
                        return false;
                    }
                    return true;
                });
                
                console.log(`Found ${validScholars.length} valid scholars out of ${scholars.length}`);
                
                resultDiv.innerHTML = `
                    <p>Successfully loaded ${Object.keys(scholarsData).length} scholars!</p>
                    <p>Converted ${scholars.length} scholars to array format</p>
                    <p>Found ${validScholars.length} valid scholars</p>
                    <p>First scholar: ${validScholars[0].name}</p>
                    <pre>${JSON.stringify(validScholars[0], null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <p style="color: red;">Error loading scholars.json: ${error.message}</p>
                    <p>Check the console for more details.</p>
                `;
            }
        });
    </script>
</body>
</html>
